name: Sync public repo

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check secret
        run: echo "Token length ${#TOKEN}"
        env:
          TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}

      - name: Push to public repo
        run: |
          git remote add public https://x-access-token:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/Nayarr/AssurFillOCR.git
          git push public main --force
